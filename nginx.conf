events {
    worker_connections 1024;
}

http {
    # Define upstream backend servers for API routes
    upstream api_backend {
        server flask:8080;
        server express:8081;
        server laravel:8000;
    }

    # Define upstream for React frontend
    upstream react_frontend {
        server react:3000;
    }

    server {
        listen 80;
        
        # API routes - load balance between Flask and Express
        location /api {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # All other routes - fallback to React
        location / {
            proxy_pass http://react_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Handle React Router (SPA) - try files first, then fallback to index.html
            try_files $uri $uri/ @react_fallback;
        }
        
        # Fallback for React Router
        location @react_fallback {
            proxy_pass http://react_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}